<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McpProxy 管理控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-container {
            font-family: 'Fira Code', 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        .log-entry {
            border-bottom: 1px solid #333;
            padding: 2px 0;
        }
        .log-info { color: #4fc1ff; }
        .log-warn { color: #ce9178; }
        .log-error { color: #f44747; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-xl font-bold text-blue-400">McpProxy</h1>
            <p class="text-xs text-gray-400">系統管理控制台</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showTab('logs')" id="btn-logs" class="w-full text-left px-4 py-2 rounded transition bg-blue-600 text-white">
                📜 系統日誌
            </button>
            <button onclick="showTab('todos')" id="btn-todos" class="w-full text-left px-4 py-2 rounded transition hover:bg-gray-700">
                ✅ 待辦事項
            </button>
            <button onclick="showTab('status')" id="btn-status" class="w-full text-left px-4 py-2 rounded transition hover:bg-gray-700">
                📊 系統狀態
            </button>
        </nav>
        <div class="p-4 border-t border-gray-700 text-xs text-gray-500 text-center">
            v1.0.0-beta
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        
        <!-- Logs Tab -->
        <div id="tab-logs" class="flex-1 flex flex-col overflow-hidden">
            <div class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-lg font-semibold">實時系統日誌</h2>
                <button onclick="clearLogs()" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">清除畫面</button>
            </div>
            <div id="log-window" class="flex-1 overflow-y-auto p-4 log-container text-sm">
                <!-- Logs will be appended here -->
                <div class="text-gray-500 italic">正在連接日誌流...</div>
            </div>
        </div>

        <!-- Todos Tab -->
        <div id="tab-todos" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-lg font-semibold">待辦事項管理</h2>
            </div>
            <div class="p-6 overflow-y-auto">
                <div class="max-w-2xl mx-auto">
                    <!-- Add Todo Form -->
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="todo-input" placeholder="新增任務..." class="flex-1 bg-gray-800 border border-gray-700 rounded px-4 py-2 focus:outline-none focus:border-blue-500">
                        <select id="todo-priority" class="bg-gray-800 border border-gray-700 rounded px-2 py-2 focus:outline-none">
                            <option value="low">低</option>
                            <option value="medium" selected>中</option>
                            <option value="high">高</option>
                        </select>
                        <button onclick="addTodo()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold transition">新增</button>
                    </div>
                    <!-- Todo List -->
                    <div id="todo-list" class="space-y-2">
                        <!-- Todos will be rendered here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Tab -->
        <div id="tab-status" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="p-4 bg-gray-800 border-b border-gray-700">
                <h2 class="text-lg font-semibold">系統狀態監控</h2>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-gray-400">MCP Server</span>
                        <span id="status-mcp" class="px-2 py-1 rounded text-xs font-bold bg-gray-600">檢查中...</span>
                    </div>
                    <div class="text-sm text-gray-500">負責處理 MCP 協議與工具執行</div>
                </div>
                <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-gray-400">Caddy Proxy</span>
                        <span id="status-caddy" class="px-2 py-1 rounded text-xs font-bold bg-gray-600">檢查中...</span>
                    </div>
                    <div class="text-sm text-gray-500">負責 HTTPS 隧道與外部訪問</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = '/api';

        function showTab(tabId) {
            ['logs', 'todos', 'status'].forEach(id => {
                document.getElementById('tab-' + id).classList.add('hidden');
                document.getElementById('btn-' + id).classList.remove('bg-blue-600', 'text-white');
                document.getElementById('btn-' + id).classList.add('hover:bg-gray-700');
            });
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('bg-blue-600', 'text-white');
            
            if (tabId === 'todos') loadTodos();
            if (tabId === 'status') checkStatus();
        }

        // --- Log Logic ---
        function clearLogs() {
            document.getElementById('log-window').innerHTML = '';
        }

        function appendLog(text) {
            const win = document.getElementById('log-window');
            const div = document.createElement('div');
            div.className = 'log-entry';
            
            let colorClass = 'log-info';
            if (text.toLowerCase().includes('error') || text.toLowerCase().includes('失敗')) colorClass = 'log-error';
            else if (text.toLowerCase().includes('warn') || text.toLowerCase().includes('警告')) colorClass = 'log-warn';
            
            div.innerHTML = `<span class="${colorClass}">${text}</span>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function initLogStream() {
            const eventSource = new EventSource(`${API_BASE}/logs/stream`);
            eventSource.onmessage = (event) => {
                appendLog(event.data);
            };
            eventSource.addEventListener('log', (event) => {
                appendLog(event.data);
            });
            eventSource.onerror = () => {
                appendLog('❌ 日誌流連線中斷，嘗試重新連接...');
            };
        }

        // --- Todo Logic ---
        async function loadTodos() {
            const res = await fetch(`${API_BASE}/todos`);
            const data = await res.json();
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            
            data.forEach(todo => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-3 rounded border ${todo.completed ? 'bg-gray-800 border-gray-700 opacity-50' : 'bg-gray-700 border-gray-600'}`;
                
                const priorityColor = {
                    'high': 'text-red-400',
                    'medium': 'text-yellow-400',
                    'low': 'text-green-400'
                }[todo.priority] || 'text-gray-400';

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo('${todo.id}')" class="w-4 h-4 rounded">
                        <span class="${todo.completed ? 'line-through text-gray-500' : ''}">${todo.content}</span>
                        <span class="text-xs font-bold ${priorityColor}">[${todo.priority}]</span>
                    </div>
                    <button onclick="deleteTodo('${todo.id}')" class="text-gray-500 hover:text-red-400 transition">🗑️</button>
                `;
                list.appendChild(div);
            });
        }

        async function addTodo() {
            const input = document.getElementById('todo-input');
            const priority = document.getElementById('todo-priority').value;
            if (!input.value.trim()) return;

            await fetch(`${API_BASE}/todos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: input.value, priority: priority })
            });
            input.value = '';
            loadTodos();
        }

        async function toggleTodo(id) {
            await fetch(`${API_BASE}/todos/${id}/toggle`, { method: 'PATCH' });
            loadTodos();
        }

        async function deleteTodo(id) {
            if (!confirm('確定要刪除此任務嗎？')) return;
            await fetch(`${API_BASE}/todos/${id}`, { method: 'DELETE' });
            loadTodos();
        }

        // --- Status Logic ---
        async function checkStatus() {
            // 這裡簡單透過嘗試請求 /api/todos 來判斷伺服器是否在線
            try {
                const res = await fetch(`${API_BASE}/todos`);
                if (res.ok) {
                    updateStatus('status-mcp', '運行中', 'bg-green-600');
                }
            } catch (e) {
                updateStatus('status-mcp', '離線', 'bg-red-600');
            }
            // Caddy 狀態通常由 MCP Server 的健康檢查決定，這裡簡化處理
            updateStatus('status-caddy', '運行中', 'bg-green-600');
        }

        function updateStatus(id, text, color) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.className = `px-2 py-1 rounded text-xs font-bold ${color}`;
        }

        // Init
        window.onload = () => {
            initLogStream();
            checkStatus();
        };
    </script>
</body>
</html>
